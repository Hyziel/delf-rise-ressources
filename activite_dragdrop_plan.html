<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activité — Organise le plan</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--c1:#0c0e1d;--c2:#ebf6ff;--c3:#5dac98;--c4:#478978;--c5:#376c5f}

body{font-family:'Inter',system-ui,sans-serif;background:#ffffff;padding:0;}

/* ══ BARRE SOFIA ══ */
.sofia-bar{
  background:#eff7f5;
  border:1px solid rgba(93,172,152,.35);
  padding:9px 16px;
  display:flex;
  align-items:center;
  gap:10px;
  border-radius:10px;
  max-width:640px;
  margin:16px auto 0;
}
.sofia-bar-name{color:var(--c5);font-size:0.68em;font-weight:700;text-transform:uppercase;letter-spacing:0.09em;flex-shrink:0;}
.sofia-bar-conf{display:flex;align-items:center;gap:7px;flex:1;}
.sofia-bar-conf-label{color:var(--c4);font-size:0.68em;font-weight:700;white-space:nowrap;}
.sofia-bar-track{flex:1;height:6px;background:rgba(93,172,152,.2);border-radius:99px;overflow:hidden;min-width:60px;}
.sofia-bar-fill{height:100%;width:0%;border-radius:99px;background:linear-gradient(90deg,#5dac98,#a8ddd0);transition:width 1.1s cubic-bezier(0.4,0,0.2,1);}
.sofia-bar-pct{color:var(--c5);font-size:0.75em;font-weight:800;min-width:30px;text-align:right;}
.sofia-bar-emoji-end{font-size:0.9em;transition:opacity 0.8s;opacity:0.3;}
.sofia-step-label{color:var(--c4);font-size:0.67em;font-weight:700;white-space:nowrap;border-left:1px solid rgba(93,172,152,.3);padding-left:10px;}

/* ══ FEEDBACK STRIP SOFIA ══ */
.sofia-feedback-strip{display:none;align-items:center;gap:10px;padding:8px 16px;font-family:'Inter',system-ui,sans-serif;}
.sofia-feedback-strip.sofia-visible{display:flex;animation:sofiaSlide 0.3s ease;}
.sofia-feedback-success{background:#d4ede7;border:1px solid rgba(93,172,152,.4);}
.sofia-feedback-fail{background:#fdf0f0;border:1px solid rgba(220,80,80,.2);}
.sofia-feedback-strip p{color:#1a2a25;font-size:0.84em;font-style:italic;line-height:1.4;}
@keyframes sofiaSlide{from{opacity:0;transform:translateY(-5px);}to{opacity:1;transform:translateY(0);}}

/* ══ CONTENU ══ */
.wrap{padding:20px 20px 24px;max-width:640px;margin:0 auto;}

.badge-step{display:inline-flex;align-items:center;background:rgba(93,172,152,.12);border:1px solid rgba(93,172,152,.28);border-radius:20px;padding:4px 12px;margin-bottom:14px;}
.badge-step span{color:var(--c4);font-size:11px;font-weight:700;letter-spacing:.06em;}
.instr{color:#2a3a35;font-size:13.5px;line-height:1.6;margin-bottom:14px;}

.tries-row{display:flex;align-items:center;gap:8px;margin-bottom:20px;}
.tries-label{color:#888;font-size:11px;}
.try-dot{width:10px;height:10px;border-radius:50%;background:#eee;border:1px solid #ddd;transition:background .2s;}
.try-dot.used{background:rgba(93,172,152,.5);border-color:var(--c3);}
.try-dot.fail{background:rgba(220,100,100,.4);border-color:#dc6464;}

.columns{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px;}
.col-label{color:#888;font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;margin-bottom:8px;}

.bank{background:#f8fbfe;border:1px solid #dce8f0;border-radius:10px;padding:12px;min-height:280px;}
.plan{background:#f2faf7;border:1px solid rgba(93,172,152,.2);border-radius:10px;padding:12px;min-height:280px;}

.plan-slots{display:flex;flex-direction:column;gap:8px;}
.slot{border:1.5px dashed rgba(93,172,152,.3);border-radius:8px;min-height:52px;display:flex;align-items:center;padding:0 10px;gap:10px;transition:border-color .15s,background .15s;}
.slot.drag-over{border-color:var(--c3);background:rgba(93,172,152,.1);}
.slot-num{color:var(--c4);font-size:12px;font-weight:700;min-width:18px;}
.slot-placeholder{color:#bbb;font-size:12px;font-style:italic;}
.slot.filled{border-style:solid;border-color:rgba(93,172,152,.25);}
.slot.ok{border-color:var(--c3);background:rgba(93,172,152,.1);}
.slot.ko{border-color:rgba(220,100,100,.4);background:rgba(220,100,100,.05);}

.bank-items{display:flex;flex-direction:column;gap:8px;}
.card{background:#ffffff;border:1px solid #dde8e4;border-radius:8px;padding:10px 12px;font-size:12.5px;color:#1a2a25;line-height:1.45;cursor:grab;transition:background .12s,border-color .12s,opacity .12s;user-select:none;-webkit-user-select:none;}
.card:hover{background:#f2faf7;border-color:var(--c3);}
.card.dragging{opacity:.4;cursor:grabbing;}
.card.placed{background:#edf7f4;border-color:rgba(93,172,152,.3);color:#1a2a25;}
.card.ok{background:rgba(93,172,152,.15);border-color:var(--c3);color:var(--c5);font-weight:500;}
.card.ko{background:#fdf0f0;border-color:rgba(220,100,100,.3);color:#c0504d;}

.feedback{margin-bottom:14px;border-radius:8px;padding:12px 14px;font-size:13px;line-height:1.55;display:none;color:#1a2a25;}
.feedback.show{display:block;}
.feedback.ok-fb{background:#edf7f4;border:1px solid rgba(93,172,152,.35);}
.feedback.warn{background:#fdf6e8;border:1px solid rgba(220,160,60,.35);}
.feedback.error{background:#fdf0f0;border:1px solid rgba(220,80,80,.2);}
.feedback strong{color:var(--c5);}
.feedback.warn strong{color:#b8860b;}
.feedback.error strong{color:#c0504d;}

.bottom{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.helper{color:#aaa;font-size:12px;}
.btn-row{display:flex;gap:8px;}
.btn{background:var(--c4);color:#fff;border:none;border-radius:8px;padding:9px 20px;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s;}
.btn:disabled{background:#c8ddd9;color:#fff;cursor:default;}
.btn:not(:disabled):hover{background:var(--c5);}
.btn-retry{background:#f0f4f8;color:#555;border:1px solid #dde;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:500;cursor:pointer;transition:background .15s;display:none;}
.btn-retry:hover{background:#e4eaf2;}

.touch-ghost{position:fixed;pointer-events:none;opacity:.85;z-index:9999;border-radius:8px;padding:10px 12px;font-size:12.5px;font-family:'Inter',sans-serif;background:rgba(71,137,120,.9);color:#fff;max-width:240px;line-height:1.45;transform:translate(-50%,-50%);display:none;}
</style>
</head>
<body>

<!-- ══ BARRE SOFIA ══ -->
<div class="sofia-bar">
  <span class="sofia-bar-name">Sofia</span>
  <div class="sofia-bar-conf">
    <span class="sofia-bar-conf-label">Confiance</span>
    <span style="font-size:0.9em;">😰</span>
    <div class="sofia-bar-track">
      <div class="sofia-bar-fill" id="sofiaBarFill"></div>
    </div>
    <span class="sofia-bar-emoji-end" id="sofiaEmojiEnd">😊</span>
    <span class="sofia-bar-pct" id="sofiaBarPct">0%</span>
  </div>
  <span class="sofia-step-label" id="sofiaStepLabel">Étape 3/5</span>
</div>

<div class="sofia-feedback-strip" id="sofiaFeedbackStrip" style="max-width:640px;margin:6px auto 0;border-radius:8px;">
  <span style="font-size:1.2em;" id="sofiaFeedbackEmoji">💬</span>
  <p id="sofiaFeedbackText"></p>
</div>

<!-- ══ CONTENU ══ -->
<div class="wrap">
  <div class="badge-step"><span>ORGANISE LE PLAN</span></div>
  <div class="instr">Remets dans l'ordre les différentes idées pour construire le plan de la réponse de Sofia.</div>
  <div class="tries-row">
    <span class="tries-label">Essais</span>
    <span class="try-dot" id="dot0"></span>
    <span class="try-dot" id="dot1"></span>
    <span class="try-dot" id="dot2"></span>
  </div>

  <div class="columns">
    <div>
      <div class="col-label">Idées à placer</div>
      <div class="bank"><div class="bank-items" id="bank"></div></div>
    </div>
    <div>
      <div class="col-label">Mon plan</div>
      <div class="plan"><div class="plan-slots" id="plan"></div></div>
    </div>
  </div>

  <div class="feedback" id="fb"></div>
  <div class="bottom">
    <span class="helper" id="helper">Glisse chaque idée dans le bon emplacement</span>
    <div class="btn-row">
      <button class="btn-retry" id="btn-retry">Recommencer</button>
      <button class="btn" id="btn" disabled>Vérifier</button>
    </div>
  </div>
</div>

<div class="touch-ghost" id="ghost"></div>

<script>
/* ══ SOFIA TRACKER (embarqué) ══ */
var SofiaTracker=(function(){
  var KEY='sofia_342_progress',TOTAL=5;
  var FB={
    success:["Ouf ! Avec ça je sais exactement quoi écrire 😮‍💨","Super, j'ai plein d'idées maintenant !","Mon plan est solide, je me sens mieux !","Mon texte est bien lié, ça se lit bien ! ✨","Je suis prête à rendre ma copie. Merci ! 🎉"],
    fail:["Hmm, je ne suis pas sûre… tu peux m'aider ?","Attention, Victor est mon ami au comité !","L'ordre de mes idées ne sera pas logique…","Ce connecteur ne va pas bien là…","Oops, j'ai failli oublier de vérifier ça !"]
  };
  function load(){try{var r=localStorage.getItem(KEY);return r?JSON.parse(r):{steps:{}};}catch(e){return{steps:{}};}}
  function save(s){try{s.lastUpdate=Date.now();localStorage.setItem(KEY,JSON.stringify(s));}catch(e){}}
  function calcPct(s){var t=0;for(var i=1;i<=TOTAL;i++){if(s.steps[i]==='success')t+=100;else if(s.steps[i]==='fail')t+=40;}return Math.min(100,Math.round(t/TOTAL));}
  function render(pct,step){
    var f=document.getElementById('sofiaBarFill'),l=document.getElementById('sofiaBarPct'),e=document.getElementById('sofiaEmojiEnd'),s=document.getElementById('sofiaStepLabel');
    if(f)f.style.width=pct+'%';if(l)l.textContent=pct+'%';if(e)e.style.opacity=pct>=80?'1':'0.3';if(s&&step)s.textContent='Étape '+step+'/'+TOTAL;
  }
  function feedback(step,type,msg){
    var strip=document.getElementById('sofiaFeedbackStrip'),txt=document.getElementById('sofiaFeedbackText'),em=document.getElementById('sofiaFeedbackEmoji');
    if(!strip||!txt)return;
    txt.textContent=msg||(FB[type][step-1]||FB[type][0]);
    em.textContent=type==='success'?'😊':'😕';
    strip.className='sofia-feedback-strip sofia-feedback-'+type+' sofia-visible';
    clearTimeout(strip._t);strip._t=setTimeout(function(){strip.classList.remove('sofia-visible');},4500);
  }
  function init(step){var state=load();render(calcPct(state),step);}
  function success(step,msg){var state=load();if(state.steps[step]!=='success'){state.steps[step]='success';save(state);}render(calcPct(state),step);feedback(step,'success',msg);}
  function fail(step,msg){var state=load();if(state.steps[step]!=='success'){state.steps[step]='fail';save(state);}render(calcPct(state),step);feedback(step,'fail',msg);}
  return{init:init,success:success,fail:fail};
})();

/* ══ ACTIVITÉ ══ */
var SOFIA_STEP = 3;

var IDEAS = [
  "Salutations",
  "Dire à Victor que je suis d'accord avec son projet.",
  "La cantine est la première chose que les élèves souhaitent changer.",
  "Suggérer que les élèves d'art plastique participent à la décoration de la salle.",
  "Exprimer des réserves sur les machines de jeux pour ne pas transformer la cantine en salle de jeux bruyante.",
  "Proposer d'en parler plus en détail à la prochaine réunion d'élèves."
];

var MAX_TRIES=3,tries=0,validated=false,scorm=null,dragSrc=null,dragText=null,slots=[];

function shuffle(arr){var a=arr.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}

function initSCORM(){try{var api=window.parent.API_1484_11||window.parent.API;if(api){scorm=api;scorm.Initialize("");scorm.SetValue("cmi.completion_status","incomplete");scorm.SetValue("cmi.success_status","unknown");}}catch(e){}}

function sendSCORM(correct,total,attempt){
  try{
    var score=Math.round((correct/total)*100),passed=correct===total,exhausted=attempt>=MAX_TRIES;
    if(scorm){scorm.SetValue("cmi.score.raw",String(score));scorm.SetValue("cmi.score.min","0");scorm.SetValue("cmi.score.max","100");scorm.SetValue("cmi.score.scaled",(correct/total).toFixed(2));if(passed||exhausted){scorm.SetValue("cmi.completion_status","completed");scorm.SetValue("cmi.success_status",passed?"passed":"failed");scorm.Commit("");}}
    if(passed||exhausted)window.parent.postMessage({type:'complete'},'*');
  }catch(e){window.parent.postMessage({type:'complete'},'*');}
}

function updateDots(){for(var d=0;d<MAX_TRIES;d++){var dot=document.getElementById('dot'+d);if(d<tries-1)dot.className='try-dot fail';else if(d===tries-1)dot.className='try-dot used';else dot.className='try-dot';}}

function checkCanValidate(){var allFilled=slots.every(function(s){return s.content!==null;});document.getElementById('btn').disabled=!allFilled;document.getElementById('helper').textContent=allFilled?'Clique sur Vérifier quand tu es prêt':'Glisse chaque idée dans le bon emplacement';}

function build(){
  slots=IDEAS.map(function(_,i){return{index:i,content:null,el:null,cardEl:null};});
  var shuffled=shuffle(IDEAS);
  var bank=document.getElementById('bank');bank.innerHTML='';
  shuffled.forEach(function(text){bank.appendChild(createCard(text));});
  var planEl=document.getElementById('plan');planEl.innerHTML='';
  slots.forEach(function(slot,i){
    var slotEl=document.createElement('div');slotEl.className='slot';slotEl.setAttribute('data-slot',i);
    slotEl.innerHTML='<span class="slot-num">'+(i+1)+'</span><span class="slot-placeholder">Idée '+(i+1)+'</span>';
    setupSlotDrop(slotEl,i);slot.el=slotEl;planEl.appendChild(slotEl);
  });
  checkCanValidate();
}

function createCard(text){
  var card=document.createElement('div');card.className='card';card.textContent=text;card.setAttribute('draggable','true');card.setAttribute('data-text',text);
  setupCardDrag(card);setupTouchDrag(card);return card;
}

function setupCardDrag(card){
  card.addEventListener('dragstart',function(e){dragSrc=card;dragText=card.getAttribute('data-text');e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',dragText);setTimeout(function(){card.classList.add('dragging');},0);});
  card.addEventListener('dragend',function(){card.classList.remove('dragging');});
}

function setupSlotDrop(slotEl,slotIdx){
  slotEl.addEventListener('dragover',function(e){e.preventDefault();e.dataTransfer.dropEffect='move';slotEl.classList.add('drag-over');});
  slotEl.addEventListener('dragleave',function(){slotEl.classList.remove('drag-over');});
  slotEl.addEventListener('drop',function(e){e.preventDefault();slotEl.classList.remove('drag-over');var text=e.dataTransfer.getData('text/plain')||dragText;if(!text)return;placeCardInSlot(text,slotIdx,dragSrc);});
}

function placeCardInSlot(text,slotIdx,srcCard){
  var slot=slots[slotIdx];
  if(slot.content!==null)returnToBank(slot);
  if(srcCard){
    slots.forEach(function(s,i){if(s.content===text&&i!==slotIdx){s.content=null;s.el.innerHTML='<span class="slot-num">'+(i+1)+'</span><span class="slot-placeholder">Idée '+(i+1)+'</span>';s.el.className='slot';s.cardEl=null;}});
    var bankEl=document.getElementById('bank');var existing=bankEl.querySelector('[data-text="'+CSS.escape(text)+'"]');if(existing)bankEl.removeChild(existing);
  }
  slot.content=text;slot.el.innerHTML='<span class="slot-num">'+(slotIdx+1)+'</span>';
  var newCard=createCard(text);newCard.classList.add('placed');
  newCard.addEventListener('dblclick',function(){returnToBank(slot);checkCanValidate();});
  slot.el.appendChild(newCard);slot.el.className='slot filled';slot.cardEl=newCard;checkCanValidate();
}

function returnToBank(slot){if(slot.content===null)return;var text=slot.content;slot.content=null;slot.cardEl=null;slot.el.innerHTML='<span class="slot-num">'+(slot.index+1)+'</span><span class="slot-placeholder">Idée '+(slot.index+1)+'</span>';slot.el.className='slot';document.getElementById('bank').appendChild(createCard(text));}

var touchCard=null;
var ghost=document.getElementById('ghost');

function setupTouchDrag(card){
  card.addEventListener('touchstart',function(e){if(validated)return;touchCard=card;dragText=card.getAttribute('data-text');ghost.textContent=dragText;ghost.style.display='block';moveTouchGhost(e.touches[0]);},{passive:true});
  card.addEventListener('touchmove',function(e){e.preventDefault();moveTouchGhost(e.touches[0]);highlightSlotUnder(e.touches[0]);},{passive:false});
  card.addEventListener('touchend',function(e){ghost.style.display='none';var touch=e.changedTouches[0];var target=document.elementFromPoint(touch.clientX,touch.clientY);var slotEl=target?target.closest('.slot'):null;if(slotEl){var slotIdx=parseInt(slotEl.getAttribute('data-slot'));placeCardInSlot(dragText,slotIdx,touchCard);}clearSlotHighlights();touchCard=null;dragText=null;});
}

function moveTouchGhost(touch){ghost.style.left=touch.clientX+'px';ghost.style.top=touch.clientY+'px';}
function highlightSlotUnder(touch){clearSlotHighlights();var el=document.elementFromPoint(touch.clientX,touch.clientY);var slotEl=el?el.closest('.slot'):null;if(slotEl)slotEl.classList.add('drag-over');}
function clearSlotHighlights(){document.querySelectorAll('.slot.drag-over').forEach(function(s){s.classList.remove('drag-over');});}

function validate(){
  if(validated)return;validated=true;tries++;updateDots();
  var correct=0;
  slots.forEach(function(slot,i){
    var isOk;
    if(i===3){isOk=slot.content===IDEAS[3]||slot.content===IDEAS[4];}
    else if(i===4){isOk=slot.content===IDEAS[4]||slot.content===IDEAS[3];}
    else{isOk=slot.content===IDEAS[i];}
    if(isOk)correct++;
    slot.el.className='slot filled '+(isOk?'ok':'ko');
    if(slot.cardEl)slot.cardEl.className='card placed '+(isOk?'ok':'ko');
  });
  var total=IDEAS.length,fb=document.getElementById('fb'),btnRetry=document.getElementById('btn-retry'),btnVal=document.getElementById('btn');
  btnVal.disabled=true;
  if(correct===total){
    fb.className='feedback show ok-fb';
    fb.innerHTML='<strong>Excellent !</strong> Le plan est parfaitement ordonné. Sofia sait maintenant comment structurer sa réponse de façon logique et cohérente.';
    btnVal.textContent='Terminé ✓';
    SofiaTracker.success(SOFIA_STEP);
    sendSCORM(correct,total,tries);
  } else if(tries<MAX_TRIES){
    fb.className='feedback show warn';
    fb.innerHTML='<strong>'+correct+'/'+total+' idées bien placées.</strong> Les cases vertes sont correctes, les rouges sont à revoir. Recommence !';
    btnVal.textContent='Vérifier';btnRetry.style.display='inline-block';
  } else {
    fb.className='feedback show error';
    fb.innerHTML='<strong>3 essais utilisés.</strong> Voici l\'ordre correct :<ol style="margin:8px 0 0 18px;line-height:1.8">'+IDEAS.map(function(idea){return'<li>'+idea+'</li>';}).join('')+'</ol>';
    btnVal.textContent='Terminé';btnRetry.style.display='none';
    SofiaTracker.fail(SOFIA_STEP);
    sendSCORM(correct,total,tries);
  }
}

function reset(){validated=false;document.getElementById('fb').className='feedback';document.getElementById('fb').innerHTML='';document.getElementById('btn').textContent='Vérifier';document.getElementById('btn').disabled=true;document.getElementById('btn-retry').style.display='none';build();updateDots();}

document.addEventListener('DOMContentLoaded',function(){
  SofiaTracker.init(SOFIA_STEP);
  initSCORM();build();
  document.getElementById('btn').addEventListener('click',validate);
  document.getElementById('btn-retry').addEventListener('click',reset);
});
</script>
</body>
</html>
